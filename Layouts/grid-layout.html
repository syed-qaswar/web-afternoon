<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="grid-layout.css">
</head>
<body>
    <!-- Grid layout using grid areas -->
    
    <div class="wrapper">
        <header class="header">Header</header>

        <!-- left sidebar -->
        <aside class="sidebar">Sidebar</aside>

        <!-- main content -->
        <main class="main">
            <div class="featured">Featured</div>
            <div class="box">A</div>
            <div class="box">B</div>
            <div class="box">C</div>
        </main>

        <!-- right sidebar -->
        <aside class="aside">
            Aside
        </aside>

        <!-- footer -->
        <footer class="footer">Footer</footer>
    </div>
</body>
</html>
