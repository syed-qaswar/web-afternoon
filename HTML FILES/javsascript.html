    <!-- To-do List with js and tailwind css -->
    <div class="h-screen flex flex-col justify-center items-center p-2">
        <h1 class="font-semibold">To-do List with HTML, Tailwind and JS</h1>

        <div class="my-2">
            <input 
            type="text"
            id="task-input"
            placeholder="Enter a new task.."
            class="border border-blue-500 rounded-md p-1">
            <button 
            type="button" 
            id="task-btn"
            class="bg-amber-300 px-3 py-1 rounded-lg border border-black">
                Add Task
            </button>
        </div>

        <!-- list for tasks -->
        <ol class="task-list w-full"></ol>
    </div>

    <button onclick="calculator('+')">+</button>
